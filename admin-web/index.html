<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>配送运营后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="brand-eyebrow">Delivery Worker</p>
          <h1>运营后台</h1>
          <p class="brand-copy">先用可视化后台把真实业务数据管起来，再逐步接入云数据库自动同步。</p>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="sidebar-panel">
          <p class="sidebar-title">当前能力</p>
          <ul class="sidebar-list">
            <li>员工增删改查</li>
            <li>项目进度管理</li>
            <li>操作日志查看</li>
            <li>JSON 导入导出</li>
          </ul>
        </div>
      </aside>
      <main class="main">
        <header class="hero">
          <div>
            <p class="hero-kicker">真实数据模式</p>
            <h2>人员、项目、日志三条线先跑通</h2>
            <p class="hero-copy">这套后台现在可以直接本地管理数据，并保留了后续对接微信云开发管理接口的位置。你可以先可视化运营，再决定何时接入实时云同步。</p>
          </div>
          <div class="hero-card">
            <span id="heroStatusLabel">当前阶段</span>
            <strong id="heroStatusValue">本地可运行后台</strong>
            <small id="heroStatusHint">支持本地持久化，后续可接 /admin/* 云接口</small>
          </div>
        </header>
        <section class="dashboard-strip" id="dashboardStrip"></section>
        <section class="panel" id="panel"></section>
      </main>
    </div>
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.6.2/tcb.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
